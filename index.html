<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FARSIAN WAR Command Center v3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{--gold:#d4af37;--gold2:#8a6a1f;}
*{box-sizing:border-box}
body{
margin:0;padding:15px;
font-family:'Vazirmatn',sans-serif;
background:radial-gradient(circle at top,#3a2a08,#181818 25%,#090909);
color:#fff;
}
.container{max-width:1000px;margin:auto}
.panel{
background:#141414;
border:1px solid var(--gold2);
border-radius:24px;
padding:20px;
box-shadow:0 0 30px rgba(212,175,55,.15);
}
.logo{
font-family:'Orbitron',sans-serif;
text-align:center;
font-size:clamp(28px,5vw,46px);
color:var(--gold);
}
.subtitle{text-align:center;color:#aaa;margin:10px 0 25px}
label{display:block;margin:10px 0 6px;color:var(--gold);font-weight:700}
input,select,textarea{
width:100%;padding:14px;border-radius:12px;
background:#0e0e0e;border:1px solid #333;color:white;
font-family:'Vazirmatn',sans-serif;
}
textarea{min-height:220px;resize:vertical}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
button{
flex:1;min-width:140px;padding:14px;border:none;border-radius:12px;
cursor:pointer;font-family:'Vazirmatn',sans-serif;font-weight:700;
}
.gen{background:var(--gold);color:black}
.copy{background:#222;color:white}
pre{
background:#080808;border-right:5px solid var(--gold);
padding:15px;border-radius:12px;
white-space:pre-wrap;word-break:break-word;line-height:2;
}
.footer{
margin-top:30px;
padding-top:20px;
border-top:1px solid rgba(212,175,55,.2);
text-align:center;
color:#888;
font-size:14px;
line-height:2;
}
.footer .creator{
color:var(--gold);
font-weight:700;
}
@media(max-width:600px){
.buttons{flex-direction:column}
button{width:100%}
}
</style>
</head>
<body>
<div class="container">
<div class="panel">

<div class="logo">FARSIAN WAR</div>
<div class="subtitle">Global Command Center</div>

<label>کشور</label>
<select id="country">
<option value="─⊱- 🇮🇷 𝐈𝐑𝐀𝐍 – 𝐓𝐡𝐞 𝐏𝐞𝐫𝐬𝐢𝐚𝐧 𝐏𝐨𝐰𝐞𝐫 ⚔️ – 𝐈𝐑𝐈𝐁 🗞️, 𝐓𝐚𝐬𝐧𝐢𝐦 🗞️, 𝐅𝐚𝐫𝐬 𝐍𝐞𝐰𝐬 🗞️">IRAN</option>

<option value="─⊱- 🛡️ 𝐈𝐑𝐆𝐂 – 𝐆𝐮𝐚𝐫𝐝𝐢𝐚𝐧𝐬 𝐨𝐟 𝐭𝐡𝐞 𝐑𝐞𝐯𝐨𝐥𝐮𝐭𝐢𝐨𝐧 🔥 – 𝐓𝐚𝐬𝐧𝐢𝐦 🗞️, 𝐅𝐚𝐫𝐬 𝐍𝐞𝐰𝐬 🗞️, 𝐒𝐞𝐩𝐚𝐡 𝐍𝐞𝐰𝐬 🗞️">IRGC</option>

<option value="─⊱- 🇱🇧 𝐇𝐄𝐙𝐁𝐎𝐋𝐋𝐀𝐇 – 𝐑𝐞𝐬𝐢𝐬𝐭𝐚𝐧𝐜𝐞 𝐅𝐨𝐫𝐜𝐞 ⚔️ – 𝐀𝐥 𝐌𝐚𝐧𝐚𝐫 🗞️, 𝐀𝐥 𝐀𝐡𝐞𝐝 🗞️">HEZBOLLAH</option>

<option value="─⊱- 🇾🇪 𝐘𝐄𝐌𝐄𝐍 – 𝐆𝐚𝐭𝐞 𝐨𝐟 𝐭𝐡𝐞 𝐑𝐞𝐝 𝐒𝐞𝐚 🌊 – 𝐒𝐀𝐁𝐀 🗞️, 𝐀𝐥 𝐌𝐚𝐬𝐢𝐫𝐚𝐡 🗞️">YEMEN</option>

<option value="─⊱- 🇺🇸 𝐔𝐍𝐈𝐓𝐄𝐃 𝐒𝐓𝐀𝐓𝐄𝐒 – 𝐋𝐚𝐧𝐝 𝐨𝐟 𝐎𝐩𝐩𝐨𝐫𝐭𝐮𝐧𝐢𝐭𝐲 🔥 – 𝐂𝐍𝐍 🗞️, 𝐀𝐁𝐂 🗞️, 𝐍𝐁𝐂 🗞️">UNITED STATES</option>

<option value="─⊱- 🇮🇱 𝐈𝐒𝐑𝐀𝐄𝐋 – 𝐈𝐫𝐨𝐧 𝐒𝐡𝐢𝐞𝐥𝐝 🛡️ – 𝐓𝐢𝐦𝐞𝐬 𝐨𝐟 𝐈𝐬𝐫𝐚𝐞𝐥 🗞️, 𝐇𝐚𝐚𝐫𝐞𝐭𝐳 🗞️">ISRAEL</option>

<option value="─⊱- 🕵️ 𝐌𝐎𝐒𝐒𝐀𝐃 – 𝐒𝐡𝐚𝐝𝐨𝐰𝐬 𝐎𝐟 𝐈𝐧𝐭𝐞𝐥𝐥𝐢𝐠𝐞𝐧𝐜𝐞 🕶️ – 𝐘𝐧𝐞𝐭 🗞️, 𝐈24𝐍𝐄𝐖𝐒 🗞️">MOSSAD</option>

<option value="─⊱- 🇸🇦 𝐒𝐀𝐔𝐃𝐈 𝐀𝐑𝐀𝐁𝐈𝐀 – 𝐊𝐢𝐧𝐠𝐝𝐨𝐦 𝐨𝐟 𝐭𝐡𝐞 𝐃𝐞𝐬𝐞𝐫𝐭 🏜️ – 𝐀𝐫𝐚𝐛 𝐍𝐞𝐰𝐬 🗞️, 𝐀𝐥 𝐀𝐫𝐚𝐛𝐢𝐲𝐚 🗞️">SAUDI ARABIA</option>

<option value="─⊱- 🇹🇷 𝐓𝐔𝐑𝐊𝐄𝐘 – 𝐎𝐭𝐭𝐨𝐦𝐚𝐧 𝐋𝐞𝐠𝐚𝐜𝐲 ⚔️ – 𝐀𝐧𝐚𝐝𝐨𝐥𝐮 🗞️, 𝐓𝐑𝐓 🗞️">TURKEY</option>

<option value="─⊱- 🇵🇰 𝐏𝐀𝐊𝐈𝐒𝐓𝐀𝐍 – 𝐆𝐫𝐞𝐞𝐧 𝐂𝐫𝐞𝐬𝐜𝐞𝐧𝐭 ☪️ – 𝐃𝐚𝐰𝐧 🗞️, 𝐆𝐞𝐨 𝐍𝐞𝐰𝐬 🗞️">PAKISTAN</option>

<option value="─⊱- 🇮🇳 𝐈𝐍𝐃𝐈𝐀 – 𝐆𝐫𝐞𝐚𝐭 𝐒𝐮𝐛𝐜𝐨𝐧𝐭𝐢𝐧𝐞𝐧𝐭 🐘 – 𝐍𝐃𝐓𝐕 🗞️, 𝐈𝐧𝐝𝐢𝐚 𝐓𝐨𝐝𝐚𝐲 🗞️">INDIA</option>

<option value="─⊱- 🇴🇲 𝐎𝐌𝐀𝐍 – 𝐆𝐚𝐭𝐞𝐰𝐚𝐲 𝐎𝐟 𝐀𝐫𝐚𝐛𝐢𝐚 🇴🇲 – 𝐓𝐢𝐦𝐞𝐬 𝐎𝐟 𝐎𝐦𝐚𝐧 🗞️">OMAN</option>

<option value="─⊱- 🇶🇦 𝐐𝐀𝐓𝐀𝐑 – 𝐌𝐞𝐝𝐢𝐚 𝐏𝐨𝐰𝐞𝐫 📡 – 𝐀𝐥 𝐉𝐚𝐳𝐞𝐞𝐫𝐚 🗞️, 𝐐𝐍𝐀 🗞️">QATAR</option>

<option value="─⊱- 🇧🇭 𝐁𝐀𝐇𝐑𝐀𝐈𝐍 – 𝐏𝐞𝐚𝐫𝐥 𝐎𝐟 𝐓𝐡𝐞 𝐆𝐮𝐥𝐟 🦪 – 𝐁𝐍𝐀 🗞️, 𝐆𝐮𝐥𝐟 𝐃𝐚𝐢𝐥𝐲 𝐍𝐞𝐰𝐬 🗞️">BAHRAIN</option>

<option value="─⊱- 🇦🇪 𝐔𝐍𝐈𝐓𝐄𝐃 𝐀𝐑𝐀𝐁 𝐄𝐌𝐈𝐑𝐀𝐓𝐄𝐒 – 𝐃𝐞𝐬𝐞𝐫𝐭 𝐅𝐚𝐥𝐜𝐨𝐧 🦅 – 𝐖𝐀𝐌 🗞️, 𝐓𝐡𝐞 𝐍𝐚𝐭𝐢𝐨𝐧𝐚𝐥 🗞️">UAE</option>

<option value="─⊱- 🇫🇷 𝐅𝐑𝐀𝐍𝐂𝐄 – 𝐑𝐞𝐩𝐮𝐛𝐥𝐢𝐜 𝐎𝐟 𝐋𝐢𝐠𝐡𝐭 ✨ – 𝐅𝐫𝐚𝐧𝐜𝐞 24 🗞️, 𝐋𝐞 𝐌𝐨𝐧𝐝𝐞 🗞️">FRANCE</option>

<option value="─⊱- 🇱🇧 𝐋𝐄𝐁𝐀𝐍𝐎𝐍 – 𝐏𝐚𝐫𝐢𝐬 𝐎𝐟 𝐓𝐡𝐞 𝐌𝐢𝐝𝐝𝐥𝐞 𝐄𝐚𝐬𝐭 🌲 – 𝐋𝐁𝐂𝐈 🗞️, 𝐍𝐍𝐀 🗞️">LEBANON</option></select>

<label>بیانیه از طرف</label>
<input id="author">

<label>تاریخ</label>
<input id="date">

<label>مکان</label>
<input id="location">

<label>متن بیانیه</label>
<textarea id="statement"></textarea>

<div class="buttons">
<button class="gen" onclick="generateStatement()">تولید بیانیه</button>
<button class="copy" onclick="copyOutput()">کپی خروجی</button>
</div>

<h3>📜 پیش‌نمایش خروجی</h3>
<pre id="output"></pre>

<div class="footer">
<div class="creator">Created By Ata</div>
<div>🛰️ FARSIAN WAR IN Telegram</div>
<div>⚔️ RAMADAN WAR</div>
<div>🌍 @Farsian_War</div>
</div>

</div>
</div>

<script>
function generateStatement(){
const tag=document.getElementById('country').value;
const author=document.getElementById('author').value;
const date=document.getElementById('date').value;
const location=document.getElementById('location').value;
const statement=document.getElementById('statement').value;

const quoted=statement.split('\n').map(line=>'> '+line).join('\n');

document.getElementById('output').textContent=`${tag}

👤 از طرف: ${author}
📅 تاریخ: ${date}
📍 مکان: ${location}

━━━━━━━━━━━━━━━━━━

📝 متن بیانیه:

${quoted}`;
}

function copyOutput(){
navigator.clipboard.writeText(document.getElementById('output').textContent);
alert('خروجی کپی شد');
}
</script>

</body>
</html>
